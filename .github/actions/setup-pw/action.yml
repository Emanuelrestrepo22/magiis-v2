name: 'Setup Playwright (MAGIIS)'
description: 'Node 20 + npm ci + Chromium con deps. Requiere checkout previo en el job.'

inputs:
  node-version:
    description: 'Version de Node.'
    required: false
    default: '20'
  install-browsers:
    description: 'Si instalar Chromium con deps. false = solo deps de Node (lint/typecheck).'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install Playwright browsers (chromium)
      if: ${{ inputs.install-browsers == 'true' }}
      shell: bash
      run: npx playwright install --with-deps chromium
