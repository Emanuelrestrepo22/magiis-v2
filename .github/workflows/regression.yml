name: Regression - carrier V2

# Suite completa funcional. Por ahora solo corre en TEST.
# UAT esta documentado abajo (comentado) y se activara cuando RRHH/DevOps
# configuren el environment UAT en GitHub con sus vars + secrets.
on:
  schedule:
    - cron: '0 7 * * *' # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  regression-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Environment TEST expone vars (BASE_URL, LOGIN_PATH) y secrets
    # (USER_CARRIER_AR, PASS_CARRIER_AR) configurados desde GitHub UI.
    environment: TEST
    env:
      ENV: test
      CI: 'true'
      HEADLESS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run regression (excluye @visual)
        env:
          # Variables publicas del environment TEST.
          BASE_URL: ${{ vars.BASE_URL }}
          LOGIN_PATH: ${{ vars.LOGIN_PATH }}
          # Credenciales region AR (las primarias EEUU no estan cargadas en CI).
          # runtime.ts usa USER_CARRIER/PASS_CARRIER (sin sufijo) como primaria;
          # mapeamos AR -> primaria para que global-setup funcione sin cambios.
          USER_CARRIER: ${{ secrets.USER_CARRIER_AR }}
          PASS_CARRIER: ${{ secrets.PASS_CARRIER_AR }}
        run: npx playwright test --grep-invert @visual

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-test-report
          path: evidence/test/
          retention-days: 14

  # ============================================================
  # Job UAT pendiente de activacion.
  # ============================================================
  # Bloqueado hasta que se configure el environment UAT en GitHub con:
  #   vars:   BASE_URL, LOGIN_PATH
  #   secrets: USER_CARRIER_AR, PASS_CARRIER_AR  (o equivalente UAT)
  # Cuando esten cargadas, descomentar este job y opcionalmente
  # agregarlo al schedule (o dejarlo solo en workflow_dispatch).
