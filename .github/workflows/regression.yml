name: Regression - carrier V2

# Suite completa funcional. Por ahora solo corre en TEST.
# UAT esta documentado abajo (comentado) y se activara cuando RRHH/DevOps
# configuren el environment UAT en GitHub con sus vars + secrets.
on:
  schedule:
    - cron: '0 7 * * *' # nightly 07:00 UTC
  workflow_dispatch:
    inputs:
      shards:
        description: 'Cantidad de shards en paralelo (1 = sin sharding)'
        required: false
        default: '4'
        type: string

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pw
        with:
          install-browsers: 'false'
      - run: npm run lint
      - run: npm run typecheck

  regression-test:
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Environment TEST expone vars (BASE_URL, LOGIN_PATH) y secrets
    # (USER_CARRIER_AR, PASS_CARRIER_AR) configurados desde GitHub UI.
    environment: TEST
    strategy:
      fail-fast: false
      # Sharding 4-way reduce ~90 min secuencial a ~25 min (4 shards paralelos).
      # Cada shard ejecuta globalSetup (auth carrier) independiente.
      matrix:
        shard: [1, 2, 3, 4]
    env:
      ENV: test
      CI: 'true'
      HEADLESS: 'true'
      TOTAL_SHARDS: '4'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pw

      - name: Run regression shard ${{ matrix.shard }}/${{ env.TOTAL_SHARDS }} (excluye @visual)
        env:
          # Variables publicas del environment TEST.
          BASE_URL: ${{ vars.BASE_URL }}
          LOGIN_PATH: ${{ vars.LOGIN_PATH }}
          # Primaria: US (carrier EEUU). global-setup usa USER_CARRIER/PASS_CARRIER sin sufijo.
          USER_CARRIER: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER: ${{ secrets.PASS_CARRIER_US }}
          # Regiones disponibles para specs parametrizados (resolveCredentials('US'|'AR'|...)).
          USER_CARRIER_US: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER_US: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_AR: ${{ secrets.USER_CARRIER_AR }}
          PASS_CARRIER_AR: ${{ secrets.PASS_CARRIER_AR }}
          # Cuando exista carrier FR, agregar:
          # USER_CARRIER_FR: ${{ secrets.USER_CARRIER_FR }}
          # PASS_CARRIER_FR: ${{ secrets.PASS_CARRIER_FR }}
        run: npx playwright test --grep-invert @visual --shard=${{ matrix.shard }}/${{ env.TOTAL_SHARDS }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          # Reportes por shard para poder reconciliar JUnit si se necesita un agregado.
          name: regression-test-report-shard-${{ matrix.shard }}
          path: evidence/test/
          retention-days: 14

      - name: Validate Teams webhook secret
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL missing in environment TEST"
            exit 1
          fi
          echo "TEAMS_WEBHOOK_URL available"

      - name: Notify Teams (resultado del shard)
        if: always()
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PROJECT: carrier-v2-e2e
          SUITE: regression-shard-${{ matrix.shard }}
          JOB_STATUS: ${{ job.status }}
        run: bash scripts/notify-teams.sh

  # ============================================================
  # Job UAT pendiente de activacion.
  # ============================================================
  # Bloqueado hasta que se configure el environment UAT en GitHub con:
  #   vars:   BASE_URL, LOGIN_PATH
  #   secrets: USER_CARRIER_AR, PASS_CARRIER_AR  (o equivalente UAT)
  # Cuando esten cargadas, descomentar este job y opcionalmente
  # agregarlo al schedule (o dejarlo solo en workflow_dispatch).
  # Replica el patron de sharding 4-way del job TEST.
