  #         BASE_URL: ${{ vars.BASE_URL }}
  #         LOGIN_PATH: ${{ vars.LOGIN_PATH }}
  #         USER_CARRIER: ${{ secrets.USER_CARRIER_AR }}
  #         PASS_CARRIER: ${{ secrets.PASS_CARRIER_AR }}
