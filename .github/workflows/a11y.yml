name: A11y audit - carrier V2

# Suite de accesibilidad WCAG 2.1 AA usando @axe-core/playwright.
# Modo SOFT AUDIT: scans loguean violations como annotations sin fallar CI.
# Util para tracking del estado a11y de V2 en cada release y reporte QA.
on:
  schedule:
    - cron: '0 8 * * 1' # weekly los lunes 08:00 UTC (no diario - bajo cambio esperado)
  workflow_dispatch:
    inputs:
      grep:
        description: 'Patron --grep (default @a11y)'
        required: false
        default: '@a11y'
        type: string

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pw
        with:
          install-browsers: 'false'
      - run: npm run lint
      - run: npm run typecheck

  a11y:
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Environment TEST expone vars + secrets configurados desde GitHub UI.
    environment: TEST
    env:
      ENV: test
      CI: 'true'
      HEADLESS: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pw

      - name: Run a11y audit (@a11y por defecto, override via dispatch)
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          LOGIN_PATH: ${{ vars.LOGIN_PATH }}
          # Primaria: US (mismo patron que smoke.yml + regression.yml).
          USER_CARRIER: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_US: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER_US: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_AR: ${{ secrets.USER_CARRIER_AR }}
          PASS_CARRIER_AR: ${{ secrets.PASS_CARRIER_AR }}
        run: npx playwright test --grep "${{ inputs.grep || '@a11y' }}" --project=carrier-v2-desktop

      # FW-011: gate suave de regresion a11y. Compara violations por regla contra
      # tests/fixtures/a11y-baseline.json. Falla SOLO si crecen (regresion); las 478
      # ya conocidas no bloquean. Como a11y corre weekly/dispatch (no en PRs), este
      # gate marca rojo el job semanal cuando la accesibilidad empeora, sin frenar dev.
      - name: A11y regression gate (FW-011)
        if: always()
        run: node scripts/check-a11y-regression.cjs evidence/test/results.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-test-report
          path: evidence/test/
          retention-days: 30

      - name: Validate Teams webhook secret
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL missing in environment TEST"
            exit 1
          fi
          echo "TEAMS_WEBHOOK_URL available"

      - name: Notify Teams (resultado del run)
        if: always()
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PROJECT: carrier-v2-e2e
          SUITE: a11y
          JOB_STATUS: ${{ job.status }}
        run: bash scripts/notify-teams.sh
