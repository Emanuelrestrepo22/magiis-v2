name: Visual regression - carrier V2

# Suite visual aislada. Compara contra baselines versionados.
# La actualizacion de baselines requiere ejecucion manual con flag update.
#
# Historial 2026-07-08: schedule fue desactivado temporalmente en PR #25 tras
# 4 iteraciones fallidas del helper visual (v2/v3/v4 con bbox variable, v4 con
# .card-header inexistente). Fix v5.1 (clip fijo 150px + maxDiffPixels 15000)
# validado con 2 dispatches consecutivos verdes (28971477999, 28971641231).
# Schedule reactivado en este PR.
on:
  schedule:
    - cron: '0 12 * * *' # nightly 09:00 ART (12:00 UTC) - escalonado tras regression
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Actualizar baselines (solo permitido en test)'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']

# Permisos: write para que el step de commit de baselines pueda push a la branch.
permissions:
  contents: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pw
        with:
          install-browsers: 'false'
      - run: npm run lint
      - run: npm run typecheck

  visual:
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Environment TEST expone vars (BASE_URL, LOGIN_PATH) y secrets (USER_CARRIER_AR,
    # PASS_CARRIER_AR) configurados desde GitHub UI.
    environment: TEST
    env:
      ENV: test # baselines viven en test
      CI: 'true'
      HEADLESS: 'true'
      TZ: UTC # browser/app dates must stay aligned with the baseline timezone
    steps:
      - uses: actions/checkout@v4
        with:
          # ref + token necesarios para que el step de push de baselines pueda commitear.
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup-pw

      - name: Run visual specs
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          LOGIN_PATH: ${{ vars.LOGIN_PATH }}
          # Primaria: US. AR/FR disponibles para baselines region-especificos a futuro.
          USER_CARRIER: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_US: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER_US: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_AR: ${{ secrets.USER_CARRIER_AR }}
          PASS_CARRIER_AR: ${{ secrets.PASS_CARRIER_AR }}
        run: |
          # Inline para no depender del npm script (el dispatch puede venir desde main
          # antes de que se mergee el fix de package.json). --project=visual garantiza
          # que solo corra en el project visual (codegen no tiene auth -> rompia).
          if [ "${{ inputs.update_baselines }}" = "true" ]; then
            npx playwright test tests/specs/visual --project=visual --update-snapshots
          else
            npx playwright test tests/specs/visual --project=visual
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-report
          path: evidence/test/
          retention-days: 14

      - name: Commit updated baselines (solo workflow_dispatch + update=true)
        # Solo si el step de tests pego verde con los baselines actualizados.
        if: success() && inputs.update_baselines == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "magiis-qa-bot"
          git config user.email "qa-bot@magiis.com"
          # Playwright guarda baselines junto al spec en <spec>-snapshots/.
          # En este repo: tests/specs/visual/dashboard.visual.spec.ts-snapshots/*.png
          # NO usar ** (git add no soporta globstar, falla con "did not match any files").
          # Usar * que matchea dentro del nivel directo + agregar el folder de specs por si
          # se agregan nuevos specs en subcarpetas.
          git add tests/specs/visual/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(visual): [MX-5711] update baselines [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Validate Teams webhook secret
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL missing in environment TEST"
            exit 1
          fi
          echo "TEAMS_WEBHOOK_URL available"

      - name: Notify Teams (resultado del run)
        if: always()
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PROJECT: carrier-v2-e2e
          SUITE: visual
          JOB_STATUS: ${{ job.status }}
        run: bash scripts/notify-teams.sh
