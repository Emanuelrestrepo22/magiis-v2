name: Visual regression - carrier V2

# Suite visual aislada. Compara contra baselines versionados.
# La actualizacion de baselines requiere ejecucion manual con flag update.
on:
  schedule:
    - cron: '30 7 * * *' # nightly 07:30 UTC
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Actualizar baselines (solo permitido en test)'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']

# Permisos: write para que el step de commit de baselines pueda push a la branch.
permissions:
  contents: write

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Environment TEST expone vars (BASE_URL, LOGIN_PATH) y secrets (USER_CARRIER_AR,
    # PASS_CARRIER_AR) configurados desde GitHub UI.
    environment: TEST
    env:
      ENV: test # baselines viven en test
      CI: 'true'
      HEADLESS: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          # ref + token necesarios para que el step de push de baselines pueda commitear.
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run visual specs
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          LOGIN_PATH: ${{ vars.LOGIN_PATH }}
          # Primaria: US. AR/FR disponibles para baselines region-especificos a futuro.
          USER_CARRIER: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_US: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER_US: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_AR: ${{ secrets.USER_CARRIER_AR }}
          PASS_CARRIER_AR: ${{ secrets.PASS_CARRIER_AR }}
        run: |
          if [ "${{ inputs.update_baselines }}" = "true" ]; then
            npm run test:visual:update
          else
            npm run test:visual
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-report
          path: evidence/test/
          retention-days: 14

      - name: Commit updated baselines (solo workflow_dispatch + update=true)
        if: inputs.update_baselines == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "magiis-qa-bot"
          git config user.email "qa-bot@magiis.com"
          git add tests/specs/visual/__screenshots__/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(visual): [MX-5711] update baselines [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
