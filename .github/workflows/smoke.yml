name: Smoke - carrier V2

# Suite minima @P1 para feedback rapido en PRs y nightly.
on:
  pull_request:
    paths:
      - 'tests/**'
      - 'playwright.config.ts'
      - 'global-setup.ts'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - 'carrier-v2/**'
      - 'infra/**'
      - 'analysis/**'
  schedule:
    - cron: '0 6 * * *' # nightly 06:00 UTC
  workflow_dispatch:
    inputs:
      grep:
        description: 'Patron --grep (default @P1)'
        required: false
        default: '@P1'
        type: string

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Environment TEST expone vars (BASE_URL, LOGIN_PATH) y secrets
    # (USER_CARRIER_AR, PASS_CARRIER_AR) configurados desde GitHub UI.
    environment: TEST
    env:
      ENV: test
      CI: 'true'
      HEADLESS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run smoke specs (@P1 por defecto, override via dispatch input)
        env:
          # Variables publicas del environment TEST.
          BASE_URL: ${{ vars.BASE_URL }}
          LOGIN_PATH: ${{ vars.LOGIN_PATH }}
          # Primaria: US (carrier EEUU). global-setup usa USER_CARRIER/PASS_CARRIER sin sufijo.
          USER_CARRIER: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER: ${{ secrets.PASS_CARRIER_US }}
          # Regiones disponibles para specs parametrizados (resolveCredentials('US'|'AR'|...)).
          # Reglas financieras (simbolo moneda + separadores) varian por carrier; idioma EN/ES estable.
          USER_CARRIER_US: ${{ secrets.USER_CARRIER_US }}
          PASS_CARRIER_US: ${{ secrets.PASS_CARRIER_US }}
          USER_CARRIER_AR: ${{ secrets.USER_CARRIER_AR }}
          PASS_CARRIER_AR: ${{ secrets.PASS_CARRIER_AR }}
          # Cuando exista carrier FR, agregar:
          # USER_CARRIER_FR: ${{ secrets.USER_CARRIER_FR }}
          # PASS_CARRIER_FR: ${{ secrets.PASS_CARRIER_FR }}
        # Smoke = @P1 funcional. Excluye @visual (corre en visual.yml con baseline propio)
        # y --testIgnore del project en playwright.config.ts si fuera necesario.
        run: npx playwright test --grep "${{ inputs.grep || '@P1' }}" --grep-invert "@visual" --project=carrier-v2-desktop

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: evidence/test/
          retention-days: 7
